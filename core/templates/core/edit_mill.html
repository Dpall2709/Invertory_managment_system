{% extends 'core/base.html' %}
{% block page_title %}Edit Mill{% endblock %}

{% block content %}

<div class="panel">

  <div class="list-header">
    <div>
      <h2 class="list-title">Edit Mill / Supplier</h2>
      <p class="muted">Update mill details</p>
    </div>

    <div class="list-actions">
      <a href="{% url 'mill_list' %}" class="btn btn-outline">⬅ Back to List</a>
    </div>
  </div>

  <form method="POST" class="form">
    {% csrf_token %}

    <div class="form-grid">
      <div class="form-group">
        <label>Mill Name *</label>
        <input type="text" name="mill_name" value="{{ mill.mill_name }}" required>
      </div>

      <div class="form-group">
        <label>Owner Name</label>
        <input type="text" name="owner_name" value="{{ mill.owner_name }}">
      </div>

      <div class="form-group">
        <label>Mobile *</label>
        <input type="text" name="mobile" value="{{ mill.mobile }}" required>
      </div>

      <div class="form-group">
        <label>GST No</label>
        <input type="text" name="gst_number" value="{{ mill.gst_number }}">
      </div>

      <div class="form-group">
        <label>Opening Balance</label>
        <input type="number" step="0.01" name="opening_balance" value="{{ mill.opening_balance }}">
      </div>

      <div class="form-group form-full">
        <label>Address</label>
        <textarea name="address" rows="3">{{ mill.address }}</textarea>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">✅ Update Mill</button>
      <a href="{% url 'mill_list' %}" class="btn btn-outline">Cancel</a>
    </div>
  </form>

</div>

{% endblock %}
