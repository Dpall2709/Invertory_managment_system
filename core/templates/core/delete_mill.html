{% extends 'core/base.html' %}
{% block page_title %}Delete Mill{% endblock %}

{% block content %}

<div class="panel">
  <h2 class="list-title">Delete Mill</h2>
  <p class="muted">Are you sure you want to delete this mill?</p>

  <div style="margin: 20px 0; font-size:16px;">
    <b>{{ mill.mill_name }}</b><br>
    Mobile: {{ mill.mobile }}<br>
    GST: {{ mill.gst_number|default:"-" }}
  </div>

  <form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-primary" style="background:#ef4444;">🗑 Yes, Delete</button>
    <a href="{% url 'mill_list' %}" class="btn btn-outline">Cancel</a>
  </form>
</div>

{% endblock %}
