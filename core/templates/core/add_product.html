{% extends 'core/base.html' %}
{% block page_title %}Add Product{% endblock %}

{% block content %}
<div class="panel">

  <div class="list-header">
    <div>
      <h2 class="list-title">Add Product</h2>
      <p class="muted">Enter rice product details</p>
    </div>

    <div class="list-actions">
      <a href="{% url 'product_list' %}" class="btn btn-outline">📋 Product List</a>
    </div>
  </div>

  <form method="POST" class="form">
    {% csrf_token %}

    <div class="form-grid">
      <div class="form-group">
        <label>Rice Name *</label>
        <input type="text" name="rice_name" placeholder="e.g., IR-64" required>
      </div>

      <div class="form-group">
        <label>HSN Code</label>
        <input type="text" name="hsn_code" placeholder="e.g., 1006">
      </div>

      <div class="form-group">
        <label>GST %</label>
        <input type="number" step="0.01" name="gst_percent" value="0">
      </div>

      <div class="form-group" style="display:flex; align-items:center; gap:10px; margin-top:24px;">
        <input type="checkbox" name="is_active" checked>
        <label style="margin:0; font-weight:700; color:var(--text);">Active</label>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary"
        onclick="this.disabled=true; this.innerText='Saving...'; this.form.submit();">
        Save Product
      </button>
      <a href="{% url 'product_list' %}" class="btn btn-outline">Cancel</a>
    </div>

  </form>

</div>
{% endblock %}
