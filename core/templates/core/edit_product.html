{% extends 'core/base.html' %}
{% block page_title %}Edit Product{% endblock %}

{% block content %}
<div class="panel">

  <div class="list-header">
    <div>
      <h2 class="list-title">Edit Product</h2>
      <p class="muted">Update rice product details</p>
    </div>

    <div class="list-actions">
      <a href="{% url 'product_list' %}" class="btn btn-outline">⬅ Back</a>
    </div>
  </div>

  <form method="POST" class="form">
    {% csrf_token %}

    <div class="form-grid">
      <div class="form-group">
        <label>Rice Name *</label>
        <input type="text" name="rice_name" value="{{ product.rice_name }}" required>
      </div>

      <div class="form-group">
        <label>HSN Code</label>
        <input type="text" name="hsn_code" value="{{ product.hsn_code }}">
      </div>

      <div class="form-group">
        <label>GST %</label>
        <input type="number" step="0.01" name="gst_percent" value="{{ product.gst_percent }}">
      </div>

      <div class="form-group" style="display:flex; align-items:center; gap:10px; margin-top:24px;">
        <input type="checkbox" name="is_active" {% if product.is_active %}checked{% endif %}>
        <label style="margin:0; font-weight:700; color:var(--text);">Active</label>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Update Product</button>
      <a href="{% url 'product_list' %}" class="btn btn-outline">Cancel</a>
    </div>

  </form>

</div>
{% endblock %}
